name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install lint tools
        run: |
          pip install flake8
          npm install -g eslint

      - name: Lint Python API
        run: flake8 api

      - name: Lint Python Worker
        run: flake8 worker

      - name: Lint JavaScript
        run: |
          cd frontend
          npm install
          npx eslint app.js

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008
          dockerfile: api/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008
          dockerfile: worker/Dockerfile

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008,DL3018
          dockerfile: frontend/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          cd api
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        working-directory: api
        env:
          PYTHONPATH: .
        run: pytest --cov=main --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/htmlcov


  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - uses: actions/checkout@v4

      - name: Build and push API
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push Worker
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push Frontend
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t api-scan ./api

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api-scan
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Upload scan
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif


  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - uses: actions/checkout@v4

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:8000/health; do
            echo "Waiting for API..."; sleep 5
          done'
          echo "API is up"

      - name: Wait for Frontend to be healthy
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:3000/health; do
            echo "Waiting for frontend..."; sleep 5
          done'
          echo "Frontend is up"

      - name: Submit job via frontend
        run: |
          echo "=== Submitting job ==="
          SUBMIT_RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $SUBMIT_RESPONSE"

          # Validate JSON and job_id
          JOB_ID=$(echo "$SUBMIT_RESPONSE" | jq -r '.job_id // empty')
          if [ -z "$JOB_ID" ]; then
            echo "ERROR: No job_id returned. Full response: $SUBMIT_RESPONSE"
            echo "=== Frontend logs ==="
            docker compose logs frontend
            echo "=== API logs ==="
            docker compose logs api
            exit 1
          fi

          echo "Job ID: $JOB_ID"

          # Wait for worker to process
          echo "=== Waiting for job completion ==="
          timeout 30 bash -c "until [ \"\$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')\" = 'completed' ]; do
            echo 'Job not done yet...'; sleep 3
          done"

          FINAL=$(curl -s http://localhost:8000/jobs/$JOB_ID)
          echo "Final job state: $FINAL"

          STATUS=$(echo "$FINAL" | jq -r '.status')
          if [ "$STATUS" != "completed" ]; then
            echo "ERROR: Expected 'completed', got '$STATUS'"
            docker compose logs worker
            exit 1
          fi

          echo "Integration test PASSED"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Rolling deploy check
        run: |
          docker compose up -d --build api
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done'