name: CI/CD Pipeline

permissions:
  contents: read
  actions: write

on:
  push:
    branches:
      - "**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install lint tools
        run: |
          pip install flake8
          npm install -g eslint

      - name: Lint Python API
        run: flake8 api

      - name: Lint Python Worker
        run: flake8 worker

      - name: Lint JavaScript
        run: |
          cd frontend
          npm install
          npx eslint app.js

      - name: Lint Dockerfile (API)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008,DL3059,DL3018
          dockerfile: api/Dockerfile

      - name: Lint Dockerfile (Worker)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008,DL3059,DL3018
          dockerfile: worker/Dockerfile

      - name: Lint Dockerfile (Frontend)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          ignore: DL3008,DL3059,DL3018
          dockerfile: frontend/Dockerfile


  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests
        run: pytest --cov=main --cov-report=xml --cov-report=html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov


  build:
    runs-on: ubuntu-latest
    needs: test

    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (layer cache)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          load: true
          tags: api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Push API image to local registry
        run: |
          docker tag "api:${{ github.sha }}" "localhost:5000/api:${{ github.sha }}"
          docker tag "api:${{ github.sha }}" "localhost:5000/api:latest"
          docker push "localhost:5000/api:${{ github.sha }}"
          docker push "localhost:5000/api:latest"

      - name: Build Worker image (layer cache)
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: false
          load: true
          tags: worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker

      - name: Push Worker image to local registry
        run: |
          docker tag "worker:${{ github.sha }}" "localhost:5000/worker:${{ github.sha }}"
          docker tag "worker:${{ github.sha }}" "localhost:5000/worker:latest"
          docker push "localhost:5000/worker:${{ github.sha }}"
          docker push "localhost:5000/worker:latest"

      - name: Build Frontend image (layer cache)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Push Frontend image to local registry
        run: |
          docker tag "frontend:${{ github.sha }}" "localhost:5000/frontend:${{ github.sha }}"
          docker tag "frontend:${{ github.sha }}" "localhost:5000/frontend:latest"
          docker push "localhost:5000/frontend:${{ github.sha }}"
          docker push "localhost:5000/frontend:latest"


  security-scan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image for security scan
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          load: true
          tags: api-scan:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: api-scan:latest
          format: sarif
          output: trivy.sarif
          severity: CRITICAL
          exit-code: 0

      - name: Upload Trivy SARIF report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy.sarif


  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start all services
        run: docker compose up -d --build

      - name: Wait for API to be healthy
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:8000/health; do
            echo "Waiting for API..."; sleep 5
          done'
          echo "API is up"

      - name: Wait for Frontend to be healthy
        run: |
          timeout 90 bash -c 'until curl -sf http://localhost:3000/health; do
            echo "Waiting for frontend..."; sleep 5
          done'
          echo "Frontend is up"

      - name: Submit job via frontend
        run: |
          echo "=== Submitting job ==="
          SUBMIT_RESPONSE=$(curl -s -X POST http://localhost:3000/submit)
          echo "Response: $SUBMIT_RESPONSE"

          # Validate JSON and job_id
          JOB_ID=$(echo "$SUBMIT_RESPONSE" | jq -r '.job_id // empty')
          if [ -z "$JOB_ID" ]; then
            echo "ERROR: No job_id returned. Full response: $SUBMIT_RESPONSE"
            echo "=== Frontend logs ==="
            docker compose logs frontend
            echo "=== API logs ==="
            docker compose logs api
            exit 1
          fi

          echo "Job ID: $JOB_ID"

          # Wait for worker to process
          echo "=== Waiting for job completion ==="
          timeout 30 bash -c "until [ \"\$(curl -s http://localhost:8000/jobs/$JOB_ID | jq -r '.status')\" = 'completed' ]; do
            echo 'Job not done yet...'; sleep 3
          done"

          FINAL=$(curl -s http://localhost:8000/jobs/$JOB_ID)
          echo "Final job state: $FINAL"

          STATUS=$(echo "$FINAL" | jq -r '.status')
          if [ "$STATUS" != "completed" ]; then
            echo "ERROR: Expected 'completed', got '$STATUS'"
            docker compose logs worker
            exit 1
          fi

          echo "Integration test PASSED"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Rolling deploy check
        run: |
          docker compose up -d --build api
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 5; done'
